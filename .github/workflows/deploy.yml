name: Deploy MVC with Web Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./Frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./Frontend
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Update Database
        # Note: Your DB server must allow connections from GitHub Actions IPs.
        run: dotnet ef database update --project Taskboard --configuration Release
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}

      - name: Publish
        run: dotnet publish --configuration Release --output publish --no-build

      # NOTE: The deployment to Render will happen automatically as long as the Render
      # dashboard is connected to this GitHub repository. Render will detect the push,
      # and if these tests pass, it will build the Dockerfile and deploy the new version.