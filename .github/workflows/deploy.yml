name: Deploy MVC with Web Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./Frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./Frontend
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Update Database
        # Note: Your DB server must allow connections from GitHub Actions IPs.
        run: dotnet ef database update --project Taskboard --configuration Release
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}

      - name: Publish
        run: dotnet publish --configuration Release --output publish --no-build



      - name: Deploy to SmarterASP
        uses: talunzhang/auto-web-deploy@v1.0.1
        with:
          website-name: "${{ secrets.WEBSITE_NAME }}"
          server-computer-name: "${{ secrets.SERVER_COMPUTER_NAME }}"
          #literallyno change but remove '(' from password
          server-username: "${{ secrets.SERVER_USERNAME }}"
          server-password: "${{ secrets.SERVER_PASSWORD }}"
          source-path: 'publish'