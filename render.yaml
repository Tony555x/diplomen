services:
  - type: web
    name: taskboard-api
    env: docker
    dockerfilePath: Dockerfile
    plan: free # or "starter" depending on your billing
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false # You will enter this value manually in the Render dashboard (copy from Aiven)
      - key: Jwt__Key
        generateValue: true # Render will auto-generate a strong 256-bit key for you!
      - key: Jwt__Issuer
        value: https://taskboard-api.onrender.com # Update if you attach a custom domain
